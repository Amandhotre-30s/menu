<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Name</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --wine-deep: #5C1726;
    --wine: #7A2138;
    --wine-light: #9C4B5F;
    --ink: #1A1210;
    --cream: #F3E9DE;
    --cream-dim: rgba(243,233,222,0.72);
    --gold: #C9A357;
    --gold-soft: rgba(201,163,87,0.45);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
  }

  body{
    min-height: 100vh;
    background: var(--ink);
    font-family: 'Inter', sans-serif;
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  @media (prefers-reduced-motion: no-preference){
    .card{
      animation: rise 0.7s cubic-bezier(.2,.7,.2,1) both;
    }
    .crest{
      animation: settle 0.9s cubic-bezier(.2,.7,.2,1) 0.15s both;
    }
  }

  @keyframes rise{
    from{ opacity: 0; transform: translateY(18px); }
    to{ opacity: 1; transform: translateY(0); }
  }
  @keyframes settle{
    from{ opacity: 0; transform: scale(0.85); }
    to{ opacity: 1; transform: scale(1); }
  }

  .card{
    position: relative;
    width: 100%;
    max-width: 380px;
    min-height: 640px;
    background:
      repeating-linear-gradient(
        135deg,
        rgba(255,255,255,0.025) 0px,
        rgba(255,255,255,0.025) 1px,
        transparent 1px,
        transparent 64px
      ),
      radial-gradient(circle at 50% 0%, var(--wine-light) 0%, var(--wine) 45%, var(--wine-deep) 100%);
    border-radius: 26px;
    padding: 26px;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,0.55),
      0 0 0 1px rgba(0,0,0,0.2);
  }

  /* gold double-rule frame, the signature element */
  .frame{
    position: absolute;
    inset: 14px;
    border: 1px solid var(--gold-soft);
    border-radius: 16px;
    pointer-events: none;
  }
  .frame::after{
    content: "";
    position: absolute;
    inset: 7px;
    border: 1px solid rgba(201,163,87,0.22);
    border-radius: 10px;
  }

  .content{
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    flex: 1;
    padding: 30px 14px 10px;
  }

  .crest{
    width: 92px;
    height: 92px;
    border-radius: 50%;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 10px 24px -8px rgba(0,0,0,0.45),
      0 0 0 1px var(--gold-soft),
      0 0 0 5px rgba(26,18,16,0.12);
    margin-bottom: 26px;
    flex-shrink: 0;
  }
  .crest svg{ width: 52px; height: 52px; }

  h1{
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: clamp(28px, 7vw, 34px);
    letter-spacing: 0.01em;
    margin: 0 0 10px;
    text-align: center;
    color: var(--cream);
  }

  .tagline{
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--cream-dim);
    margin: 0 0 34px;
    text-align: center;
  }

  .divider{
    width: 46px;
    height: 1px;
    background: var(--gold-soft);
    margin: -18px 0 32px;
  }

  .menu-btn{
    appearance: none;
    border: none;
    cursor: pointer;
    background: var(--cream);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15.5px;
    letter-spacing: 0.01em;
    padding: 16px 30px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 12px 22px -10px rgba(0,0,0,0.5);
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  }
  .menu-btn:hover{
    background: #fff;
    transform: translateY(-2px);
    box-shadow: 0 16px 26px -10px rgba(0,0,0,0.55);
  }
  .menu-btn:active{ transform: translateY(0); }
  .menu-btn:focus-visible{
    outline: 2px solid var(--gold);
    outline-offset: 4px;
  }
  .menu-btn svg{
    width: 17px;
    height: 17px;
    transition: transform 0.18s ease;
  }
  .menu-btn:hover svg{ transform: translateX(3px); }

  .spacer{ flex: 1; }

  .follow-label{
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cream-dim);
    margin: 0 0 16px;
  }

  .socials{
    display: flex;
    gap: 14px;
    margin-bottom: 6px;
  }

  .social-btn{
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--cream);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    transition: transform 0.18s ease, background 0.18s ease;
  }
  .social-btn:hover{
    background: #fff;
    transform: translateY(-2px);
  }
  .social-btn:focus-visible{
    outline: 2px solid var(--gold);
    outline-offset: 3px;
  }
  .social-btn svg{ width: 19px; height: 19px; }

  @media (max-width: 360px){
    .card{ padding: 18px; min-height: 600px; }
    .content{ padding: 24px 6px 10px; }
  }
</style>
</head>
<body>

  <main class="card" role="main">
    <div class="frame" aria-hidden="true"></div>

    <div class="content">
      <div class="crest" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 30c0-9.94 8.06-18 18-18s18 8.06 18 18" stroke="#5C1726" stroke-width="2.4" stroke-linecap="round"/>
          <circle cx="20" cy="22" r="2.6" fill="#5C1726"/>
          <circle cx="32" cy="16" r="2.6" fill="#5C1726"/>
          <circle cx="44" cy="22" r="2.6" fill="#5C1726"/>
          <rect x="13" y="30" width="38" height="5" rx="2.5" fill="#5C1726"/>
          <path d="M16 39c0 5.6 7.16 10 16 10s16-4.4 16-10" stroke="#5C1726" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M19 46c2.4 2.4 7.6 4 13 4s10.6-1.6 13-4" stroke="#5C1726" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>

      <h1>Restaurant Name</h1>
      <p class="tagline">Est. tradition, served nightly</p>

      <a class="menu-btn" href="#menu">
        View Menu
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>

      <div class="spacer"></div>

      <p class="follow-label">Follow us on</p>
      <div class="socials">
        <a class="social-btn" href="#" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="17.2" cy="6.8" r="1.1" fill="currentColor"/>
          </svg>
        </a>
        <a class="social-btn" href="#" aria-label="Message us">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 11.5a8.38 8.38 0 0 1-1.9 5.4c-1.6 1.94-4.17 3.1-6.97 3.1-.9 0-1.78-.12-2.6-.36L4 21l1.5-3.93A8.38 8.38 0 0 1 3 11.5C3 7.36 6.94 4 11.85 4S21 7.36 21 11.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>
    </div>
  </main>

</body>
</html>
